<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tester-huester</title>
    <style>
      body { width: 280px; margin: 0; padding: 14px; background: #0b0f1a; color: #e6edf7; font: 13px system-ui, sans-serif; }
      h1 { font-size: 15px; margin: 0 0 12px; }
      label { display: block; margin-bottom: 8px; color: #8ea0bd; font-size: 12px; }
      input { width: 100%; margin-top: 3px; padding: 8px 10px; background: #131a2b; border: 1px solid #223049; border-radius: 8px; color: #e6edf7; font: inherit; outline: none; }
      input:focus { border-color: #0a84ff; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      button { flex: 1; height: 38px; border: 0; border-radius: 9px; font-weight: 700; cursor: pointer; }
      .save { background: #131a2b; color: #e6edf7; border: 1px solid #223049; }
      .cap { background: #0a84ff; color: #fff; }
      .hint { margin-top: 10px; color: #64748b; font-size: 11.5px; }
      .ok { color: #34d399; }
    </style>
  </head>
  <body>
    <h1>🐞 tester-huester</h1>
    <label>Collector URL<input id="url" placeholder="http://localhost:4319" /></label>
    <label>Ingest key<input id="key" placeholder="th_demo_key_0001" /></label>
    <div class="row">
      <button class="save" id="save">Save</button>
      <button class="cap" id="capture">📸 Capture</button>
    </div>
    <div class="hint" id="hint">Or press <b>Ctrl+Shift+Y</b> on any page.</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
